# Koyeb 部署配置
# 文档: https://koyeb.com/docs

name: villa-booking-bot
region: frankfurt

# 服务配置
services:
  - name: web
    github:
      repository: Zsx154855/villa-booking-bot
      branch: main
    build_command: pip install -r requirements.txt
    start_command: python bot.py
    healthcheck:
      path: /health
    ports:
      - port: 8080
        protocol: tcp
    env:
      - key: TELEGRAM_BOT_TOKEN
        required: true
      - key: PORT
        value: "8080"
    resources:
      memory: 256Mi
      cpu: 0.25
