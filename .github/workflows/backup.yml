name: Database Backup

on:
  # 定时执行 - 每天 UTC 02:00 (北京时间 10:00)
  schedule:
    - cron: '0 2 * * *'
  
  # 手动触发
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Trigger Render Backup
        run: |
          # 调用Render健康检查URL唤醒服务
          curl -s "${{ secrets.RENDER_URL }}/"
          sleep 5
          
          # 调用备份API (需要先添加这个端点)
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.BACKUP_SECRET }}" \
            "${{ secrets.RENDER_URL }}/api/backup")
          
          echo "Backup response: $RESPONSE"
          
          # 检查是否成功
          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ Backup triggered successfully"
          else
            echo "⚠️ Backup may have failed"
          fi

  notify:
    needs: backup
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send Telegram Notification
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            MSG="数据库备份已触发"
          else
            EMOJI="❌"
            MSG="数据库备份触发失败"
          fi
          
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_NOTIFY_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}" \
            -d text="$EMOJI Taimili Villa Bot - $MSG" \
            -d parse_mode="HTML"
